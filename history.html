<script>
    const API = "https://script.google.com/macros/s/AKfycbyyn0uk5Pf9oimAXkiEgCKikj4hX5tO9rs0hJI1zFWqvesua1DlqF2JEr6pzx2C6l2T/exec";
    const PASS = "Service";

    async function loadHistory() {
        const listDiv = document.getElementById('list');
        if (!listDiv) return;
        
        listDiv.innerHTML = '<p align="center">⌛ Loading All Transactions (Latest First)...</p>';

        try {
            const response = await fetch(`${API}?action=gethistory&password=${PASS}&t=${Date.now()}`);
            const res = await response.json();
            
            if (res.success && res.data) {
                // กรองแถวว่างออกก่อน แล้วใช้ .reverse() เพื่อเอาข้อมูลล่างสุดของ Sheet ขึ้นมาไว้บนสุด
                const historyData = res.data.filter(row => row[0] !== "" && row[0] !== undefined).reverse();

                listDiv.innerHTML = historyData.map(item => {
                    const actionValue = String(item[4] || '').trim(); // Index 4 คือ Column E (Action)
                    const actionClass = actionValue.toLowerCase(); 
                    
                    return `
                        <div class="history-row">
                            <div class="col-1">${item[0] ? new Date(item[0]).toLocaleString() : '-'}</div>
                            <div class="col-2">${item[1] || '-'}</div>
                            <div class="col-3">${item[2] || '-'}</div>
                            <div class="col-4">${item[3] || '-'}</div>
                            <div class="col-5" style="color:#ef4444; font-weight:bold;">${item[7] || '-'}</div>
                            <div class="col-6">
                                <span class="type-tag ${actionClass}">${actionValue.toUpperCase()}</span>
                            </div>
                            <div class="col-7" style="font-weight:bold; font-size:14px;">${item[5] || '0'}</div>
                            <div class="col-8" style="color:#003366; font-weight:bold;">${item[6] || '-'}</div>
                        </div>
                    `;
                }).join(''); // แสดงผลข้อมูลที่กลับด้านแล้ว
            } else {
                listDiv.innerHTML = '<p align="center" style="padding:40px;">No transaction history found.</p>';
            }
        } catch (e) { 
            console.error(e);
            listDiv.innerHTML = `<p align="center" style="color:red; padding:40px;">❌ Error: ไม่สามารถโหลดข้อมูลได้</p>`; 
        }
    }

    window.onload = loadHistory;
</script>
