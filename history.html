<script>
    // ใช้ API URL ตัวล่าสุดของพี่
    const API = "https://script.google.com/macros/s/AKfycbyyn0uk5Pf9oimAXkiEgCKikj4hX5tO9rs0hJI1zFWqvesua1DlqF2JEr6pzx2C6l2T/exec";
    const PASS = "Service";

    async function loadHistory() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<p align="center">⌛ Loading All Transactions...</p>';
        
        try {
            // ดึงข้อมูลประวัติทั้งหมดจาก Sheet TRANSACTION_LOG
            const response = await fetch(`${API}?action=gethistory&password=${PASS}&t=${Date.now()}`);
            const res = await response.json();
            
            if (res.success && res.data) {
                // แสดงผลโดยใช้ Index [0, 1, 2...] เพื่อป้องกันค่า undefined
                // เพราะ API ของพี่ส่งมาเป็นแถว (Array) ไม่ได้ส่งมาเป็นชื่อคอลัมน์
                listDiv.innerHTML = res.data.map(item => {
                    const type = String(item[5] || '').toLowerCase(); // ประเภท (withdraw/return/deduct)
                    return `
                        <div class="history-row">
                            <div class="col-date">${new Date(item[0]).toLocaleString()}</div>
                            <div class="col-mat">${item[1] || '-'}</div>
                            <div class="col-inst">${item[4] || '-'}</div>
                            <div class="col-pname">${item[3] || '-'}</div>
                            <div class="col-wo" style="color:#ef4444; font-weight:bold;">${item[8] || '-'}</div>
                            <div class="col-type">
                                <span class="type-tag ${type}">${type.toUpperCase()}</span>
                            </div>
                            <div class="col-qty" style="font-weight:bold; font-size:14px;">${item[6] || '0'}</div>
                            <div class="col-user" style="color:#003366; font-weight:bold;">${item[7] || '-'}</div>
                        </div>
                    `;
                }).reverse().join(''); // ใช้ .reverse() เพื่อให้รายการล่าสุดอยู่บนสุดเสมอ
            } else {
                listDiv.innerHTML = '<p align="center" style="padding:20px;">No transaction history found.</p>';
            }
        } catch (e) { 
            console.error(e);
            listDiv.innerHTML = `<p align="center" style="color:red; padding:20px;">Error: ไม่สามารถโหลดข้อมูลได้ (${e.message})</p>`; 
        }
    }

    // โหลดข้อมูลทันทีเมื่อเปิดหน้า
    window.onload = loadHistory;
</script>
