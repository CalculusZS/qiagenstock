<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIAGEN - Admin Enterprise System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --qiagen-blue: #003366;
            --qiagen-light: #00a3e0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        
        body { 
            background: var(--bg-gradient); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 20px; color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: auto; }

        .header-section { 
            background: var(--qiagen-blue); 
            color: white; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 35px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,51,102,0.15);
            margin-bottom: 25px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .action-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); }
        .action-card span { font-size: 2rem; }
        .action-card label { font-weight: bold; font-size: 0.95rem; cursor: pointer; }

        .c-download { color: var(--success); border-bottom: 4px solid var(--success); }
        .c-value { color: var(--qiagen-light); border-bottom: 4px solid var(--qiagen-light); }
        .c-reset { color: var(--warning); border-bottom: 4px solid var(--warning); }

        .main-card { 
            background: white; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .status-msg { padding: 18px; border-radius: 15px; margin-top: 20px; display: none; text-align: center; font-weight: bold; animation: fadeIn 0.3s; }

        /* Valuation Window Style */
        #valuation-window {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background: #f1f5f9; z-index: 1000; overflow-y:auto; padding: 30px;
        }
        .val-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 25px; }
        .val-card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .val-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .val-card small { color: #64748b; font-weight: bold; font-size: 11px; }
        .val-card h3 { font-size: 19px; margin-top: 8px; margin-bottom: 4px; font-family: 'Courier New', monospace; }
        .badge-pct { 
            position: absolute; top: 15px; right: 15px; 
            background: #f1f5f9; padding: 4px 8px; border-radius: 8px; 
            font-size: 12px; font-weight: bold; color: #475569;
        }
        .chart-container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body onload="checkAuth()">

    <div id="userModal" class="modal" style="display:none; position:fixed; z-index:1100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; margin:10% auto; padding:30px; border-radius:20px; width:350px;">
            <h3 style="margin-top:0;">🔑 Reset Password</h3>
            <div id="user-list-container"></div>
            <button onclick="closeModal()" style="width:100%; margin-top:15px; padding:10px; border-radius:10px; border:1px solid #ddd; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="valuation-window">
        <div class="val-header">
            <h2 style="margin:0; color:var(--qiagen-blue);">💰 Stock Valuation Dashboard</h2>
            <button onclick="closeValuation()" style="background:var(--danger); color:white; border:none; padding:10px 25px; border-radius:10px; font-weight:bold; cursor:pointer;">CLOSE ✕</button>
        </div>
        
        <div style="max-width:1100px; margin:auto;">
            <div class="val-card-grid">
                <div class="val-card" style="border-left: 5px solid var(--qiagen-blue);">
                    <small>ALL STOCK VALUE</small>
                    <div class="badge-pct" style="background:var(--qiagen-blue); color:white;">100%</div>
                    <h3 id="total-val">฿ 0.00</h3>
                </div>
                <div class="val-card" style="border-left: 5px solid var(--success);">
                    <small>NEW STOCK <= 1Y</small>
                    <div class="badge-pct" id="pct-126">0%</div>
                    <h3 id="aging-126-val" style="color:var(--success);">฿ 0.00</h3>
                </div>
                <div class="val-card" style="border-left: 5px solid var(--warning);">
                    <small>AGING >= 1Y</small>
                    <div class="badge-pct" id="pct-1y">0%</div>
                    <h3 id="aging-1y-val" style="color:var(--warning);">฿ 0.00</h3>
                </div>
                <div class="val-card" style="border-left: 5px solid var(--danger);">
                    <small>AGING >= 3Y</small>
                    <div class="badge-pct" id="pct-3y">0%</div>
                    <h3 id="aging-3y-val" style="color:var(--danger);">฿ 0.00</h3>
                </div>
            </div>

            <div class="chart-container">
                <div class="val-card">
                    <h4 style="margin-top:0;">Value Comparison (THB)</h4>
                    <canvas id="valBarChart"></canvas>
                </div>
                <div class="val-card">
                    <h4 style="margin-top:0;">Stock Distribution %</h4>
                    <canvas id="valPieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header-section">
            <div>
                <h2 style="margin:0; letter-spacing: 1px;">🛡️ ADMIN PANEL</h2>
                <small style="opacity: 0.8;">Qiagen Inventory Management System</small>
            </div>
            <button style="background:var(--danger); border:none; color:white; padding:10px 20px; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="logout()">LOGOUT</button>
        </div>

        <div class="action-grid">
            <div class="action-card c-download" onclick="downloadData()">
                <span>📊</span>
                <label>Export Data / Log Viewer</label>
            </div>
            <div class="action-card c-value" onclick="openValuation()">
                <span>💰</span>
                <label>Stock Valuation</label>
            </div>
            <div class="action-card c-reset" onclick="openUserModal()">
                <span>🔑</span>
                <label>Reset Account</label>
            </div>
        </div>

        <div class="main-card">
            <h3>📥 Add Stock to Central (0243)</h3>
            <textarea id="excel-input" placeholder="Paste Excel data here... "></textarea>
            <div id="status-box" class="status-msg"></div>
            <button class="btn-submit" id="btn-up" onclick="submitExcel()">🚀 CONFIRM UPLOAD & SYNC</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxv0oce-n7YrWVExNk-RAiwQ3tIUyjcBLfg6obFeytSBt6ET05tOFbzMV5LP6zaHjSh/exec"; 
        const PASS = "Service";
        let barChart, pieChart;

        function checkAuth() { if (!sessionStorage.getItem('selectedUser')) window.location.replace('index.html'); }

        async function calculateValuation() {
            showStatus("⌛ Fetching Data...", "#eff6ff", "#1e40af");
            try {
                const res = await fetch(`${API}?action=read&pass=${PASS}`).then(r => r.json());
                if (!res.success) throw new Error("API Error");

                let allStock = 0, a126 = 0, a1 = 0, a3 = 0;

                res.data.forEach(row => {
                    const val = parseFloat(row["All Value"]) || 0;
                    const age = parseFloat(row["Aging (Years)"]) || 0;

                    allStock += val;
                    if (age === 126) a126 += val;
                    else {
                        if (age >= 1) a1 += val;
                        if (age >= 3) a3 += val;
                    }
                });

                // คำนวณ %
                const getPct = (part) => total === 0 ? "0%" : ((part / total) * 100).toFixed(1) + "%";
                const total = allStock;

                // อัปเดต UI (ตัวเลขเงิน)
                const fmt = new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' });
                document.getElementById('total-val').innerText = fmt.format(allStock);
                document.getElementById('aging-126-val').innerText = fmt.format(a126);
                document.getElementById('aging-1y-val').innerText = fmt.format(a1);
                document.getElementById('aging-3y-val').innerText = fmt.format(a3);

                // อัปเดต UI (เปอร์เซ็นต์ใน Badge)
                document.getElementById('pct-126').innerText = getPct(a126);
                document.getElementById('pct-1y').innerText = getPct(a1);
                document.getElementById('pct-3y').innerText = getPct(a3);

                renderCharts(allStock, a126, a1, a3);
                showStatus("✅ Success", "#dcfce7", "#166534");
            } catch (e) { alert("Error calculating data."); }
        }

        function renderCharts(total, a126, a1, a3) {
            if (barChart) barChart.destroy();
            if (pieChart) pieChart.destroy();

            // Bar Chart
            barChart = new Chart(document.getElementById('valBarChart'), {
                type: 'bar',
                data: {
                    labels: ['All', 'Age<=1', 'Age>=1', 'Age>=3'],
                    datasets: [{
                        data: [total, a126, a1, a3],
                        backgroundColor: ['#003366', '#10b981', '#f59e0b', '#ef4444'],
                        borderRadius: 8
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            // Pie Chart (โชว์ %)
            pieChart = new Chart(document.getElementById('valPieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Age < 1Y', 'Age 1-3Y', 'Age > 3Y', 'Others'],
                    datasets: [{
                        data: [a126, a1-a3, a3, Math.max(0, total-a126-a1)],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#e2e8f0']
                    }]
                }
            });
        }

        /* --- Common Functions --- */
        function openValuation() { document.getElementById('valuation-window').style.display='block'; calculateValuation(); }
        function closeValuation() { document.getElementById('valuation-window').style.display='none'; }
        function openUserModal() { document.getElementById('userModal').style.display='block'; renderUserList(); }
        function closeModal() { document.getElementById('userModal').style.display='none'; }
        function logout() { sessionStorage.clear(); window.location.replace('index.html'); }
        function showStatus(msg, bg, color) {
            const box = document.getElementById('status-box');
            box.innerText = msg; box.style.background = bg; box.style.color = color; box.style.display = 'block';
            setTimeout(() => box.style.display='none', 3000);
        }
        function renderUserList() {
            const users = ['KM', 'TK', 'PSO', 'PK', 'PST', 'PA'];
            document.getElementById('user-list-container').innerHTML = users.map(u => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding:10px; background:#f8fafc; border-radius:10px;">
                    <strong>${u}</strong> <button onclick="quickReset('${u}')" style="cursor:pointer;">Reset</button>
                </div>
            `).join('');
        }
        async function quickReset(u) {
            await fetch(`${API}?action=setpassword&pass=${PASS}&user=${u}&newPass=1234`);
            alert('Reset Success'); closeModal();
        }
        async function submitExcel() {
            const raw = document.getElementById('excel-input').value.trim();
            if(!raw) return;
            showStatus("⌛ Syncing...", "#eff6ff", "#1e40af");
            const items = raw.split('\n').map(r => {
                const c = r.split('\t');
                return c.length >= 8 ? { mat: c[3], qty: c[5], date: c[6], batch: c[7] } : null;
            }).filter(i => i);
            const op = sessionStorage.getItem('selectedUser') || "Admin";
            const res = await fetch(`${API}?action=addstock_excel&pass=${PASS}&operator=${op}&items=${encodeURIComponent(JSON.stringify(items))}`).then(r => r.json());
            if(res.success) { showStatus("✅ Success", "#dcfce7", "#166534"); document.getElementById('excel-input').value=""; }
        }
        function downloadData() { window.location.href = `${API}?page=logs`; }
    </script>
</body>
</html>
