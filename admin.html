<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor - QIAGEN Stock</title>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .header-sup { background: #1e293b; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 13px; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        .btn-add { background: #003366; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
    </style>
</head>
<body onload="initSup()">
    <div class="container">
        <div class="header-sup">
            <div>
                <h2 style="margin:0">🛡️ Supervisor Panel</h2>
                <small>Management & Audit Controls</small>
            </div>
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0">➕ Add Stock to Central (0243)</h3>
            <div style="display:flex; gap:10px; flex-wrap: wrap;">
                <input type="text" id="s_mat" placeholder="Material Code" style="width:200px">
                <input type="number" id="s_qty" value="1" min="1" style="width:70px">
                <button class="btn-add" onclick="window.doSupAdd()">ADD STOCK</button>
            </div>
        </div>

        <div class="card">
            <h3>📦 Staff Inventory Audit</h3>
            <input type="text" placeholder="Search staff or material..." oninput="window.searchStock(this.value, 'supervisor')" style="width:100%; margin-bottom:15px; box-sizing:border-box">
            <table>
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Holder</th>
                        <th style="text-align:center">Qty</th>
                        <th style="text-align:right">Control</th>
                    </tr>
                </thead>
                <tbody id="staff-data">
                    <tr><td colspan="4" align="center">⌛ Loading Inventory...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function initSup() {
            // ตรวจสอบสิทธิ์: ถ้าไม่ใช่ Supervisor ให้เด้งกลับไปหน้า Login
            const user = sessionStorage.getItem('selectedUser');
            if (user !== 'Supervisor') {
                alert("Access Denied: Please Login as Admin");
                window.location.replace('index.html');
                return;
            }
            // ถ้าผ่าน ให้โหลดข้อมูลสต็อกทันที
            if (typeof window.loadStockData === 'function') {
                window.loadStockData('supervisor');
            }
        }
    </script>
</body>
</html>
