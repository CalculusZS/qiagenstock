<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIAGEN - Admin Control Panel</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
        }
        body { background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: auto; }
        
        /* Header */
        .header-section { 
            background: var(--primary); 
            color: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        /* Card Style */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
        }
        h3 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.25rem; }
        
        /* Input & Button */
        textarea { 
            width: 100%; height: 120px; border-radius: 12px; 
            border: 2px solid #e2e8f0; padding: 15px; 
            font-family: 'Courier New', monospace; box-sizing: border-box;
            transition: border 0.3s; resize: none;
        }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { 
            background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: bold; 
            cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-main:active { transform: translateY(0); }

        .btn-reset-nav { 
            background: var(--secondary); color: white; border: none; 
            padding: 10px 20px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }

        .btn-logout { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Modal UI */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .modal-content { 
            background: white; margin: 8% auto; padding: 30px; 
            border-radius: 20px; width: 450px; position: relative;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .user-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .user-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: #f1f5f9; border-radius: 12px;
            border: 1px solid #e2e8f0; transition: 0.2s;
        }
        .user-card:hover { border-color: var(--secondary); background: #fffcf2; }
        
        .btn-click-reset {
            background: white; color: var(--secondary); border: 2px solid var(--secondary);
            padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 12px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-click-reset:hover { background: var(--secondary); color: white; }

        .status-msg { padding: 15px; border-radius: 12px; margin-top: 15px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="userModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:24px;" onclick="closeModal()">&times;</span>
            <h3>🔑 Reset User Password</h3>
            <p style="color: #64748b; font-size: 14px;">คลิกปุ่มเพื่อ Reset เป็น <b>1234</b> และสถานะ <b>NEW</b></p>
            <div id="user-list-container" class="user-grid">
                </div>
        </div>
    </div>

    <div class="container">
        <div class="header-section">
            <h2 style="margin:0; font-size: 1.5rem;">🛡️ Admin Panel</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-reset-nav" onclick="openUserModal()">🔑 RESET USER</button>
                <button class="btn-logout" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div class="card">
            <h3>➕ Add Stock to Central (0243)</h3>
            <textarea id="excel-input" placeholder="วางข้อมูลจาก Excel (Material, Qty, Batch, Date)..."></textarea>
            <div id="status-box" class="status-msg"></div>
            <button class="btn-main" id="btn-up" onclick="submitExcel()">CONFIRM UPLOAD TO STOCK</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbygN9d0QcOY5RqL9UiezChXbs_d8cY4TVErjjP-y86R1E-ProE39rl7CtJJOvZhjXcO/exec";
        const PASS = "Service";

        function checkAuth() {
            if (!sessionStorage.getItem('selectedUser')) window.location.replace('index.html');
        }

        // --- ระบบ Reset Password ---
        function openUserModal() {
            document.getElementById('userModal').style.display = 'block';
            renderUserList();
        }

        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        function renderUserList() {
            const container = document.getElementById('user-list-container');
            const users = ['KM', 'TK', 'PSO', 'PK', 'PST', 'PA'];
            let html = '';
            users.forEach(u => {
                html += `
                    <div class="user-card">
                        <span><strong>${u}</strong></span>
                        <button class="btn-click-reset" onclick="quickReset('${u}')">CLICK TO RESET</button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        async function quickReset(username) {
            if (!confirm(`ต้องการรีเซ็ตรหัสของ ${username} เป็น '1234' ใช่หรือไม่?`)) return;
            
            closeModal();
            showStatus(`⌛ กำลังรีเซ็ต ${username}...`, "#fef9c3", "#854d0e");

            try {
                // ส่งไปที่ฟังก์ชัน setpassword โดยกำหนด newPass เป็น 1234
                const url = `${API}?action=setpassword&pass=${PASS}&user=${encodeURIComponent(username)}&newPass=1234`;
                const res = await fetch(url).then(r => r.json());
                
                if (res.success) {
                    showStatus(`✅ รีเซ็ต ${username} เรียบร้อยแล้ว (Pass: 1234)`, "#dcfce7", "#166534");
                } else {
                    showStatus("❌ เกิดข้อผิดพลาดในการรีเซ็ต", "#fee2e2", "#991b1b");
                }
            } catch (e) { 
                showStatus("❌ Connection Error", "#fee2e2", "#991b1b"); 
            }
        }

        // --- ระบบ Import Stock ---
        async function submitExcel() {
            const raw = document.getElementById('excel-input').value.trim();
            const operator = sessionStorage.getItem('selectedUser');
            if (!raw) return alert("กรุณาวางข้อมูล");

            const items = raw.split('\n').map(row => {
                const c = row.split('\t');
                return c.length >= 7 ? { batch: c[2], mat: c[3], qty: c[5], date: c[6] } : null;
            }).filter(i => i);

            if (items.length === 0) return alert("ข้อมูลไม่ถูกต้อง");
            
            const btn = document.getElementById('btn-up');
            btn.disabled = true;
            showStatus("⌛ กำลังบันทึกข้อมูล...", "#fef9c3", "#854d0e");

            try {
                const url = `${API}?action=addstock_excel&pass=${PASS}&operator=${encodeURIComponent(operator)}&items=${encodeURIComponent(JSON.stringify(items))}`;
                const res = await fetch(url).then(r => r.json());
                if (res.success) {
                    showStatus("✅ บันทึกสต็อกสำเร็จ!", "#dcfce7", "#166534");
                    document.getElementById('excel-input').value = "";
                }
            } catch (e) {
                showStatus("❌ Error: " + e.message, "#fee2e2", "#991b1b");
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(msg, bg, color) {
            const box = document.getElementById('status-box');
            box.innerText = msg; box.style.background = bg; box.style.color = color; box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        function logout() { sessionStorage.clear(); window.location.replace('index.html'); }
        window.onclick = function(event) { if (event.target == document.getElementById('userModal')) closeModal(); }
    </script>
</body>
</html>
