<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIAGEN - Admin Enterprise System</title>
    <style>
        :root {
            --qiagen-blue: #003366;
            --qiagen-light: #00a3e0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        
        body { 
            background: var(--bg-gradient); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 20px; color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: auto; }

        .header-section { 
            background: var(--qiagen-blue); 
            color: white; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 35px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,51,102,0.15);
            margin-bottom: 25px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .action-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); }
        .action-card span { font-size: 2rem; }
        .action-card label { font-weight: bold; font-size: 0.95rem; cursor: pointer; }

        .c-download { color: var(--success); border-bottom: 4px solid var(--success); }
        .c-value { color: var(--qiagen-light); border-bottom: 4px solid var(--qiagen-light); }
        .c-reset { color: var(--warning); border-bottom: 4px solid var(--warning); }

        .main-card { 
            background: white; 
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        h3 { color: var(--qiagen-blue); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        textarea { 
            width: 100%; height: 140px; border-radius: 15px; 
            border: 2px solid #e2e8f0; padding: 20px; 
            font-family: 'Courier New', monospace; box-sizing: border-box;
            background: #f8fafc; transition: 0.3s; resize: none;
            font-size: 14px;
        }
        textarea:focus { border-color: var(--qiagen-light); outline: none; background: white; }

        .btn-submit { 
            background: var(--qiagen-blue); color: white; border: none; 
            padding: 18px; border-radius: 15px; font-weight: bold; 
            cursor: pointer; width: 100%; font-size: 17px; margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { filter: brightness(1.2); letter-spacing: 1px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .modal-content { 
            background: white; margin: 8% auto; padding: 30px; 
            border-radius: 24px; width: 420px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .user-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: #f8fafc; border-radius: 12px;
            margin-top: 10px; border: 1px solid #e2e8f0;
        }
        .btn-mini-reset {
            background: #fffbeb; color: #92400e; border: 1px solid #fde68a;
            padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 12px; transition: 0.2s;
        }
        .btn-mini-reset:hover { background: var(--warning); color: white; border-color: var(--warning); }

        .status-msg { padding: 18px; border-radius: 15px; margin-top: 20px; display: none; text-align: center; font-weight: bold; animation: fadeIn 0.3s; }
    </style>
</head>
<body onload="checkAuth()">

    <div id="userModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:28px;" onclick="closeModal()">&times;</span>
            <h3 style="margin-bottom: 5px;">🔑 Reset User Credentials</h3>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Password will be set to <b>1234</b> (Status: NEW)</p>
            <div id="user-list-container"></div>
        </div>
    </div>

    <div class="container">
        <div class="header-section">
            <div>
                <h2 style="margin:0; letter-spacing: 1px;">🛡️ ADMIN PANEL</h2>
                <small style="opacity: 0.8;">Qiagen Inventory Management System</small>
            </div>
            <button style="background:var(--danger); border:none; color:white; padding:10px 20px; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="logout()">LOGOUT</button>
        </div>

        <div class="action-grid">
            <div class="action-card c-download" onclick="downloadData()">
                <span>📊</span>
                <label>Export Data / Log Viewer</label>
            </div>
            <div class="action-card c-value" onclick="checkValue()">
                <span>💰</span>
                <label>Stock Valuation</label>
            </div>
            <div class="action-card c-reset" onclick="openUserModal()">
                <span>🔑</span>
                <label>Reset Account</label>
            </div>
        </div>

        <div class="main-card">
            <h3>📥 Add Stock to Central (0243)</h3>
            <p style="font-size:12px; color: #64748b; margin-bottom:10px;"<b></b></p>
            <textarea id="excel-input" placeholder="Paste Excel data here... "></textarea>
            <div id="status-box" class="status-msg"></div>
            <button class="btn-submit" id="btn-up" onclick="submitExcel()">🚀 CONFIRM UPLOAD & SYNC</button>
        </div>
    </div>

    <script>
        // ==========================================
        // บรรทัดที่ 131: วางลิงก์ API (Web App URL) ที่นี่
        // ==========================================
        const API = "https://script.google.com/macros/s/AKfycbwjuyQDYkCBNdwBhT5WoFOrGU-LkMaoWSnM8RqlZ3DgtnbrhaamJvdKZCkYtAAFa9EL/exec"; 
        
        const PASS = "Service";

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const isLogPage = urlParams.get('page') === 'logs';
            if (!isLogPage && !sessionStorage.getItem('selectedUser')) {
                window.location.replace('index.html');
            }
        }

        function downloadData() {
            showStatus("⌛ Opening Log Management...", "#eff6ff", "#1e40af");
            window.location.href = `${API}?page=logs`;
        }

        function checkValue() {
            alert("Stock Valuation Module: Integration in progress...");
        }

        function openUserModal() {
            document.getElementById('userModal').style.display = 'block';
            renderUserList();
        }
        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        function renderUserList() {
            const container = document.getElementById('user-list-container');
            const users = ['KM', 'TK', 'PSO', 'PK', 'PST', 'PA'];
            let html = '';
            users.forEach(u => {
                html += `<div class="user-item"><span><strong>${u}</strong></span><button class="btn-mini-reset" onclick="quickReset('${u}')">CLICK TO RESET</button></div>`;
            });
            container.innerHTML = html;
        }

        async function quickReset(username) {
            if (!confirm(`Are you sure you want to reset ${username}?`)) return;
            closeModal();
            showStatus(`⌛ Resetting ${username}...`, "#fffbeb", "#92400e");
            try {
                const url = `${API}?action=setpassword&pass=${PASS}&user=${encodeURIComponent(username)}&newPass=1234`;
                const res = await fetch(url).then(r => r.json());
                if (res.success) showStatus(`✅ Successfully reset ${username} (Pass: 1234)`, "#dcfce7", "#166534");
            } catch (e) { showStatus("❌ Error connecting to server", "#fee2e2", "#991b1b"); }
        }

        async function submitExcel() {
            const raw = document.getElementById('excel-input').value.trim();
            const operator = sessionStorage.getItem('selectedUser') || "Admin";
            if (!raw) return alert("Please paste data from Excel.");
            
            const items = raw.split('\n').map(row => {
                const c = row.split('\t');
                // แก้ไข: ดึง Material (ช่อง4/Index3), Qty (ช่อง6/Index5), Date (ช่อง7/Index6), Batch (ช่อง8/Index7)
                return c.length >= 8 ? { mat: c[3], qty: c[5], date: c[6], batch: c[7] } : null;
            }).filter(i => i);

            if (items.length === 0) return alert("รูปแบบข้อมูลไม่ถูกต้อง กรุณาก๊อปปี้มาให้ครบอย่างน้อย 8 คอลัมน์");
            
            const btn = document.getElementById('btn-up');
            btn.disabled = true;
            showStatus("⌛ Synchronizing with database...", "#eff6ff", "#1e40af");

            try {
                const url = `${API}?action=addstock_excel&pass=${PASS}&operator=${encodeURIComponent(operator)}&items=${encodeURIComponent(JSON.stringify(items))}`;
                const res = await fetch(url).then(r => r.json());
                if (res.success) {
                    showStatus("✅ Stock successfully updated!", "#dcfce7", "#166534");
                    document.getElementById('excel-input').value = "";
                }
            } catch (e) { showStatus("❌ Sync Error: " + e.message, "#fee2e2", "#991b1b"); }
            finally { btn.disabled = false; }
        }

        function showStatus(msg, bg, color) {
            const box = document.getElementById('status-box');
            box.innerText = msg; box.style.background = bg; box.style.color = color; box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4000);
        }

        function logout() { sessionStorage.clear(); window.location.replace('index.html'); }
        window.onclick = function(event) { if (event.target == document.getElementById('userModal')) closeModal(); }
    </script>
</body>
</html>
