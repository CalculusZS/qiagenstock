<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header style="padding: 20px; background: white; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <a href="main.html" style="text-decoration:none; color:#003366; font-weight:bold;">← Back</a>
            <h1 style="margin:10px 0; color:#003366;">👥 Team Stock</h1>
            <input type="text" id="search" placeholder="Search Material..." oninput="filterTeam()" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; font-size:16px; box-sizing:border-box;">
        </header>

        <div style="background:white; border-radius:15px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
            <table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f1f5f9;">
                    <tr>
                        <th align="left" style="padding:12px;">Material</th>
                        <th align="center">Qty</th>
                        <th align="right" style="padding-right:15px;">Action</th>
                    </tr>
                </thead>
                <tbody id="team-data">
                    <tr><td colspan="3" align="center" style="padding:40px;">Loading team stock...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function renderTeamTable(data) {
            const tbody = document.getElementById('team-data');
            const currentUser = sessionStorage.getItem('selectedUser');
            const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];
            let html = '';

            data.forEach((item, idx) => {
                members.forEach(m => {
                    if (m !== currentUser && Number(item[m]) > 0) {
                        html += `<tr>
                            <td style="padding:15px; border-bottom:1px solid #eee;">
                                <div style="font-weight:bold;">${item.Material}</div>
                                <div style="font-size:11px; color:#666;">${item['Product Name']}</div>
                                <div style="display:inline-block; background:#e0f2fe; color:#0369a1; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:bold; margin-top:4px;">Owner: ${m}</div>
                            </td>
                            <td align="center" style="font-size:18px; border-bottom:1px solid #eee;"><b>${item[m]}</b></td>
                            <td align="right" style="padding-right:10px; border-bottom:1px solid #eee;">
                                <div style="display:flex; gap:5px; align-items:center; justify-content:flex-end;">
                                    <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${item[m]}" style="width:40px; padding:8px; border-radius:6px; border:1px solid #ddd; text-align:center;">
                                    <button onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}')" style="background:#f59e0b; color:white; border:none; padding:10px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">Transfer</button>
                                </div>
                            </td>
                        </tr>`;
                    }
                });
            });
            tbody.innerHTML = html || '<tr><td colspan="3" align="center" style="padding:40px;">No items found.</td></tr>';
        }

        function filterTeam() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = window.allRows.filter(i => String(i.Material).toLowerCase().includes(q) || String(i['Product Name']).toLowerCase().includes(q));
            renderTeamTable(filtered);
        }

        window.renderTeamTable = renderTeamTable; // ให้ app.js เรียกใช้ได้
    </script>
</body>
</html>
