<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-20">
    <div class="bg-[#003366] text-white p-4 sticky top-0 z-50 shadow-lg flex items-center justify-between">
        <button onclick="location.href='main.html'" class="p-2"><i class="fas fa-arrow-left text-xl"></i></button>
        <h1 class="text-xl font-bold italic">Team Stock</h1>
        <div class="w-10"></div>
    </div>

    <div class="p-4 sticky top-[64px] bg-slate-50 z-40">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
            <input type="text" id="search-input" onkeyup="filterTeamStock()" placeholder="Search Material or Member..." 
                class="w-full pl-12 pr-4 py-3 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-orange-500 outline-none">
        </div>
    </div>

    <div id="team-list" class="p-4 space-y-4"></div>

    <script src="js/app.js"></script>
    <script>
        // แก้ข้อ 1: บันทึก Log จาก "เพื่อน -> ไปหาเรา"
        window.renderTeamTable = function(data) {
            const container = document.getElementById('team-list');
            const currentUser = sessionStorage.getItem('selectedUser');
            const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];
            
            let html = '';
            data.forEach((item, idx) => {
                members.forEach(m => {
                    const q = Number(item[m] || 0);
                    if (m !== currentUser && q > 0) {
                        html += `
                        <div class="stock-card bg-white p-4 rounded-2xl shadow-sm border-l-4 border-orange-500 flex justify-between items-center">
                            <div class="flex-1">
                                <div class="font-bold text-[#003366] text-lg">${item.Material}</div>
                                <div class="text-xs text-slate-500 mb-2">${item['Product Name']}</div>
                                <span class="bg-orange-100 text-orange-700 px-2 py-1 rounded-md text-[10px] font-bold italic">Holder: ${m}</span>
                            </div>
                            <div class="text-right ml-4">
                                <div class="text-2xl font-black text-orange-600">${q}</div>
                                <div class="flex gap-2 mt-2">
                                    <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${q}" class="w-12 p-1 border rounded-md text-center font-bold">
                                    <button onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}', '${currentUser}')" 
                                        class="bg-orange-500 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-md">Add</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            });
            container.innerHTML = html || '<div class="text-center p-20 text-slate-400">No team stock found</div>';
        };

        // แก้ข้อ 5: ฟังก์ชันค้นหาหน้าทีม
        function filterTeamStock() {
            const val = document.getElementById('search-input').value.toUpperCase();
            const cards = document.querySelectorAll('.stock-card');
            cards.forEach(card => {
                card.style.display = card.innerText.toUpperCase().includes(val) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
