<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-tag { display: inline-block; background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-top: 4px; }
        .qty-badge { font-size: 18px; font-weight: bold; color: #2563eb; }
        .transfer-btn { background: #f59e0b; color: white; border: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; background: white; border-radius: 15px; overflow: hidden; border-collapse: collapse; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="main.html" style="text-decoration:none; color:#003366; font-weight:bold;">← Back</a>
            <h1 style="margin:10px 0; color:#003366;">👥 Team Stock</h1>
            <p style="color:#666; margin:0;">Transfer parts from team members to your stock.</p>
        </header>

        <input type="text" id="search" class="search-box" placeholder="Search Material..." oninput="filterTeamStock()">

        <table>
            <tbody id="team-data-body">
                <tr><td align="center">Loading team inventory...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="js/app.js"></script>
    <script>
        let teamData = [];
        const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];

        async function init() {
            if (window.allRows.length === 0) await window.loadStockData();
            teamData = window.allRows;
            render(teamData);
        }

        function render(data) {
            const tbody = document.getElementById('team-data-body');
            const currentUser = sessionStorage.getItem('selectedUser');
            let html = '';

            data.forEach((item, idx) => {
                members.forEach(m => {
                    if (m !== currentUser && Number(item[m]) > 0) {
                        html += `<tr>
                            <td>
                                <b>${item.Material}</b><br><small style="color:#666">${item['Product Name']}</small><br>
                                <span class="user-tag">Owner: ${m}</span>
                            </td>
                            <td align="right">
                                <div style="display:flex; align-items:center; gap:8px; justify-content:flex-end;">
                                    <span class="qty-badge">${item[m]}</span>
                                    <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${item[m]}" style="width:40px; padding:8px; border-radius:8px; border:1px solid #ddd; text-align:center;">
                                    <button class="transfer-btn" onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}')">Transfer</button>
                                </div>
                            </td>
                        </tr>`;
                    }
                });
            });
            tbody.innerHTML = html || '<tr><td align="center">No items found.</td></tr>';
        }

        function filterTeamStock() {
            const q = document.getElementById('search').value.toLowerCase();
            render(teamData.filter(i => String(i.Material).toLowerCase().includes(q) || String(i['Product Name']).toLowerCase().includes(q)));
        }

        window.onload = init;
    </script>
</body>
</html>
