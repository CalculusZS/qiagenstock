<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .card { background: white; border-radius: 12px; padding: 12px; margin: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .info { flex: 1; min-width: 0; }
        .actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .qty-badge { background: #e2e8f0; color: #003366; padding: 5px 10px; border-radius: 8px; font-weight: bold; min-width: 30px; text-align: center; }
        .btn-transfer { background: #f59e0b; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input[type="number"] { width: 40px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
    </style>
</head>
<body style="margin:0; background:#f1f5f9; font-family: sans-serif;">
    <div style="background:#003366; padding:15px; color:white; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;">
        <button onclick="location.href='main.html'" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:6px;">← Back</button>
        <div id="display-user">Team Stock</div>
    </div>

    <div style="padding: 10px;">
        <input type="text" id="searchInput" placeholder="🔍 Search material..." onkeyup="filterTeam()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box; margin-bottom:10px;">
        <div id="team-list"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let teamData = [];
        const staff = ['Kitti', 'Tatchai', 'Parinyachat', 'Phurilap', 'Penporn', 'Phuriwat'];

        async function init() {
            const res = await fetch(`${API}?action=read&pass=${MASTER_PASS}`).then(r => r.json());
            if (res.success) { teamData = res.data; render(teamData); }
        }

        function render(data) {
            const container = document.getElementById('team-list');
            let html = '';
            data.forEach((item, idx) => {
                staff.forEach(name => {
                    const q = Number(item[name] || 0);
                    if (q > 0) {
                        html += `
                        <div class="card">
                            <div class="info">
                                <div style="font-weight:bold; color:#003366; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.Material}</div>
                                <div style="font-size:12px; color:#666;">${item['Product Name']}</div>
                                <div style="font-size:11px; margin-top:4px; font-weight:bold; color:#2563eb;">👤 ${name}</div>
                            </div>
                            <div class="actions">
                                <div class="qty-badge">${q}</div>
                                <input type="number" id="t_qty_${idx}_${name}" value="1" min="1" max="${q}">
                                <button class="btn-transfer" onclick="window.addToCart('transfer','${item.Material}','${item['Product Name']}',document.getElementById('t_qty_${idx}_${name}').value,'${name}')">TRANSFER</button>
                            </div>
                        </div>`;
                    }
                });
            });
            container.innerHTML = html || '<p align="center">No data</p>';
        }

        function filterTeam() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(teamData.filter(i => String(i.Material + i['Product Name']).toLowerCase().includes(q)));
        }
        window.onload = init;
    </script>
</body>
</html>
