<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Stock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:#f4f4f4; font-family: sans-serif;">
    <div style="background:#f97316; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">TEAM STOCK</h2>
        <a href="main.html" style="color:white; text-decoration:none; font-weight:bold;">BACK</a>
    </div>

    <div style="padding:15px;">
        <input type="text" id="search" placeholder="Search Material or Friend..." oninput="window.filterTeam()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box;">
    </div>

    <div id="team-list" style="padding:15px;"></div>

    <script src="js/app.js"></script>
    <script>
        window.renderTeamTable = function(data) {
            const container = document.getElementById('team-list');
            const currentUser = sessionStorage.getItem('selectedUser');
            const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];
            
            let html = '';
            data.forEach((item, idx) => {
                members.forEach(m => {
                    const q = Number(item[m] || 0);
                    // ข้อ 5: จากเพื่อน(m) -> สู่เรา(currentUser)
                    if (m !== currentUser && q > 0) {
                        html += `
                        <div style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; border-left:5px solid #f97316; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b>${item.Material}</b><br>
                                <small style="color:orange;">👤 ${m}</small><br>
                                <small>${item['Product Name']}</small>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:20px; font-weight:bold; color:#f97316;">${q}</div>
                                <div style="display:flex; gap:5px; margin-top:5px;">
                                    <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${q}" style="width:40px; text-align:center;">
                                    <button onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}', '${currentUser}')" style="background:#f97316; color:white; border:none; padding:8px; border-radius:5px; font-weight:bold;">Transfer</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            });
            container.innerHTML = html || '<div align="center">No Stock Found</div>';
        };

        window.filterTeam = function() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = window.allRows.filter(i => i.Material.toLowerCase().includes(q) || i['Product Name'].toLowerCase().includes(q));
            window.renderTeamTable(filtered);
        };

        window.onload = () => { if(window.checkAuth()) window.loadStockData(); };
    </script>
</body>
</html>
