<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .user-tag {
            display: inline-block;
            background: #e2e8f0;
            color: #475569;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 4px;
            font-weight: bold;
        }
        .qty-badge {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
        }
        .transfer-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .transfer-btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-links">
                <a href="main.html" class="back-btn">← Back</a>
            </div>
            <h1>👥 Team Stock</h1>
            <p>โอนอะไหล่จากเพื่อนเข้าตัวเรา</p>
        </header>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search Material or Name..." onkeyup="filterTeamStock()">
        </div>

        <div class="card">
            <table width="100%">
                <thead>
                    <tr style="background: #f8fafc; text-align: left;">
                        <th style="padding:12px;">Material / Owner</th>
                        <th style="padding:12px; text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="team-data-body">
                    <tr>
                        <td colspan="2" align="center" style="padding:30px;">⌛ Loading Team Inventory...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // รายชื่อหัวคอลัมน์ของเพื่อนใน Google Sheet (ยกเว้น 0243 และคอลัมน์กลาง)
        const teamMembers = ['Kitti', 'Tatchai', 'Parinyachat', 'Phurilap', 'Penporn', 'Phuriwat'];
        let teamData = [];

        async function initTeamStock() {
            if (!window.checkAuth()) return;
            const res = await fetch(`${API}?action=read&pass=${MASTER_PASS}`).then(r => r.json());
            if (res && res.success) {
                teamData = res.data;
                window.allRows = res.data; // เก็บไว้ให้ app.js ใช้
                renderTeamTable(res.data);
            }
        }

        function renderTeamTable(data) {
            const tbody = document.getElementById('team-data-body');
            const currentUser = sessionStorage.getItem('selectedUser');
            let html = '';

            data.forEach((item, idx) => {
                teamMembers.forEach(member => {
                    // ไม่แสดงของตัวเองในหน้านี้ และแสดงเฉพาะคนที่มีของ > 0
                    if (member !== currentUser) {
                        const qty = Number(item[member] || 0);
                        if (qty > 0) {
                            html += `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding:12px;">
                                        <div style="font-weight:bold; color:#003366;">${item.Material}</div>
                                        <div style="font-size:12px; color:#666;">${item['Product Name']}</div>
                                        <span class="user-tag">👤 ${member}</span>
                                    </td>
                                    <td align="right" style="padding:12px; white-space:nowrap;">
                                        <div style="display:flex; align-items:center; gap:8px; justify-content:flex-end;">
                                            <span class="qty-badge">${qty}</span>
                                            <input type="number" id="t_qty_${idx}_${member}" value="1" min="1" max="${qty}" 
                                                style="width:40px; text-align:center; padding:6px; border-radius:8px; border:1px solid #ddd;">
                                            <button class="transfer-btn" onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${member}')">
                                                Transfer
                                            </button>
                                        </div>
                                    </td>
                                </tr>`;
                        }
                    }
                });
            });

            tbody.innerHTML = html || '<tr><td colspan="2" align="center" style="padding:20px;">No team inventory found.</td></tr>';
        }

        function filterTeamStock() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = teamData.filter(item => 
                String(item.Material).toLowerCase().includes(q) || 
                String(item['Product Name']).toLowerCase().includes(q)
            );
            renderTeamTable(filtered);
        }

        // เริ่มโหลดข้อมูล
        initTeamStock();
    </script>
</body>
</html>
