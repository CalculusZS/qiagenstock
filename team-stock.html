<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock - QIAGEN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stock-item { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
        .info { flex: 2; }
        .qty-center { flex: 1; text-align: center; font-size: 20px; font-weight: bold; color: #003366; }
        .action { flex: 1.5; display: flex; gap: 5px; justify-content: flex-end; align-items: center; }
        .user-tag { background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-top: 4px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <header style="padding: 15px;">
            <a href="main.html" style="text-decoration:none; color:#003366; font-weight:bold;">← Back</a>
            <h1 style="margin:10px 0;">👥 Team Stock</h1>
            <input type="text" id="search" placeholder="Search Material..." oninput="window.filterTeam()" 
                   style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; font-size:16px; box-sizing:border-box;">
        </header>

        <div style="background:#f1f5f9; padding:10px 15px; display:flex; font-size:12px; font-weight:bold; color:#64748b;">
            <div style="flex:2;">MATERIAL</div>
            <div style="flex:1; text-align:center;">QTY</div>
            <div style="flex:1.5; text-align:right;">ACTION</div>
        </div>

        <div id="team-data-list">
            </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.renderTeamTable = function(data) {
            const list = document.getElementById('team-data-list');
            const user = sessionStorage.getItem('selectedUser');
            const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];
            let html = '';

            data.forEach((item, idx) => {
                members.forEach(m => {
                    const q = Number(item[m] || 0);
                    if (m !== user && q > 0) {
                        html += `
                        <div class="stock-item">
                            <div class="info">
                                <div style="font-weight:bold; color:#003366;">${item.Material}</div>
                                <div style="font-size:11px; color:#666;">${item['Product Name']}</div>
                                <div class="user-tag">👤 ${m}</div>
                            </div>
                            <div class="qty-center">${q}</div>
                            <div class="action">
                                <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${q}" style="width:40px; padding:8px; border:1px solid #ddd; border-radius:6px; text-align:center;">
                                <button onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}')" 
                                        style="background:#f59e0b; color:white; border:none; padding:10px 12px; border-radius:8px; font-weight:bold; cursor:pointer;">Transfer</button>
                            </div>
                        </div>`;
                    }
                });
            });
            list.innerHTML = html || '<p align="center" style="padding:40px;">No team items found.</p>';
        };

        window.filterTeam = () => {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = window.allRows.filter(i => 
                String(i.Material).toLowerCase().includes(q) || String(i['Product Name']).toLowerCase().includes(q)
            );
            window.renderTeamTable(filtered);
        };

        window.onload = async () => {
            if (window.allRows.length === 0) await window.loadStockData();
            window.renderTeamTable(window.allRows);
        };
    </script>
</body>
</html>
