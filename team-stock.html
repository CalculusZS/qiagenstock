<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-20">
    <div class="bg-[#003366] text-white p-4 sticky top-0 z-50 flex items-center justify-between">
        <button onclick="location.href='main.html'"><i class="fas fa-arrow-left"></i></button>
        <h1 class="font-bold">Team Stock</h1>
        <div></div>
    </div>

    <div class="p-4">
        <input type="text" id="search" onkeyup="filterTeamStock()" placeholder="Search..." class="w-full p-3 rounded-xl border-none shadow-sm outline-none">
    </div>

    <div id="team-list" class="p-4 space-y-3"></div>

    <script src="js/app.js"></script>
    <script>
        window.renderTeamTable = function(data) {
            const container = document.getElementById('team-list');
            const currentUser = sessionStorage.getItem('selectedUser');
            const members = ['Kitti','Tatchai','Parinyachat','Phurilap','Penporn','Phuriwat'];
            let html = '';
            data.forEach((item, idx) => {
                members.forEach(m => {
                    const q = Number(item[m] || 0);
                    if (m !== currentUser && q > 0) {
                        html += `
                        <div class="stock-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500 flex justify-between items-center">
                            <div>
                                <div class="font-bold text-[#003366]">${item.Material}</div>
                                <div class="text-xs text-slate-500">${m}</div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-orange-600 mr-2">${q}</span>
                                <input type="number" id="t_qty_${idx}_${m}" value="1" min="1" max="${q}" class="w-10 border rounded text-center">
                                <button onclick="window.addToCart('transfer', '${item.Material}', ${idx}, '${m}', '${currentUser}')" class="bg-orange-500 text-white px-3 py-1 rounded text-xs">Add</button>
                            </div>
                        </div>`;
                    }
                });
            });
            container.innerHTML = html || '<div class="text-center p-10 text-slate-400">No data</div>';
        };

        function filterTeamStock() {
            const val = document.getElementById('search').value.toUpperCase();
            document.querySelectorAll('.stock-card').forEach(card => {
                card.style.display = card.innerText.toUpperCase().includes(val) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
